name: Terminator
version: '${project.version}'
main: dev.mitra88.terminator.Terminator
api-version: '26.2'
load: STARTUP
authors: [Mitra-88]
description: Terminator is a plugin inspired by the Terminator from Hypixel Skyblock.
website: https://github.com/Mitra-88/Terminator
permissions:
  terminator.give:
    default: true
    description: Allows players to use the /giveterminator command.
  terminator.reload:
    default: op
    description: Allows players to use the /terminatorreload command.